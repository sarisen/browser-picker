name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-15

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build release DMG
        run: bash scripts/build-release-dmg.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/release/BrowserPicker-${{ github.ref_name }}.dmg
